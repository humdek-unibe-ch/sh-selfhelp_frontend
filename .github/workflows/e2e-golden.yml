#
# Golden E2E (Slice 7).
#
# Two jobs:
#   1. compile  — PR gate. Installs deps and runs `playwright test --list`,
#      which type-checks/collects every spec without launching a browser.
#      Fast and deterministic; safe as a required check.
#   2. golden   — full end-to-end run against a real stack (frontend +
#      backend + MySQL + Redis). The reusable harness
#      (`scripts/e2e-stack.mjs`, via `npm run test:golden`) owns the whole
#      lifecycle: generate JWT keys, seed the QA database
#      (`composer test:reset-db` → backend `QaFrontendGoldenFixture`, which
#      seeds the `qa-feedback` form page the spec drives), start Symfony +
#      Next, run Playwright, then stop the processes it started.
#
# QA values are NO LONGER GitHub vars/secrets: the backend fixture owns the
# canonical QA data and the harness exports the matching defaults, so this
# workflow only needs to provide the DB/Redis the GitHub `services` block
# already starts.
#
# On failure the golden job uploads the Playwright HTML report + traces +
# screenshots + video + the harness server logs (canonical Testing Rule 26).

name: e2e-golden

on:
  pull_request:
    branches: [main]
    paths:
      - 'e2e/**'
      - 'scripts/e2e-stack.mjs'
      - 'playwright.config.ts'
      - 'package.json'
      - '.github/workflows/e2e-golden.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: e2e-golden-${{ github.ref }}
  cancel-in-progress: true

jobs:
  compile:
    name: Playwright specs compile (--list)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - name: Collect specs (no browser)
        run: npx playwright test --list

  golden:
    name: Golden form→action→job (full stack)
    runs-on: ubuntu-latest
    timeout-minutes: 40
    if: github.event_name == 'workflow_dispatch'

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: selfhelp_test
        ports: ['3306:3306']
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot --silent"
          --health-interval=5s --health-timeout=5s --health-retries=20
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd="redis-cli ping" --health-interval=5s --health-timeout=5s --health-retries=20

    env:
      # The harness inherits these; real env vars take precedence over the
      # backend `.env.test`, so they point Symfony at the GitHub services.
      APP_ENV: test
      DATABASE_URL: mysql://root:root@127.0.0.1:3306/selfhelp_test?serverVersion=8.0
      REDIS_URL: redis://127.0.0.1:6379
      BASE_URL: http://127.0.0.1:3000
      NEXT_PUBLIC_API_URL: http://127.0.0.1:8000
      SYMFONY_INTERNAL_URL: http://127.0.0.1:8000
      # Harness knobs: GitHub `services` already provide DB/Redis, and we
      # install Chromium with system deps below — so skip those harness steps.
      SELFHELP_BACKEND_DIR: ${{ github.workspace }}/sh-selfhelp_backend
      SELFHELP_E2E_SKIP_DOCKER: '1'
      SELFHELP_E2E_SKIP_PW_INSTALL: '1'

    steps:
      - name: Checkout frontend
        uses: actions/checkout@v4
        with:
          path: sh-selfhelp_frontend

      # Same-branch-or-main: coordinated cross-repo work happens on equally
      # named feature branches; run the stack against the backend branch
      # matching this build's branch name when it exists, else main. See
      # sh-selfhelp_backend/docs/developer/branch-merge-order.md.
      - name: Resolve backend ref (same branch as this build, else main)
        id: backend-ref
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          BRANCH="${GITHUB_HEAD_REF:-$GITHUB_REF_NAME}"
          REF="main"
          if [ -n "$BRANCH" ] && [ "$BRANCH" != "main" ] && \
             git ls-remote --exit-code --heads \
               "https://x-access-token:${GH_TOKEN}@github.com/humdek-unibe-ch/sh-selfhelp_backend.git" \
               "refs/heads/${BRANCH}" > /dev/null 2>&1; then
            REF="$BRANCH"
          fi
          echo "ref=${REF}" >> "$GITHUB_OUTPUT"
          echo "Resolved sh-selfhelp_backend ref: ${REF} (build branch: ${BRANCH})"

      - name: Checkout backend
        uses: actions/checkout@v4
        with:
          repository: humdek-unibe-ch/sh-selfhelp_backend
          ref: ${{ steps.backend-ref.outputs.ref }}
          path: sh-selfhelp_backend

      - name: Set up PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo_mysql, redis, intl, mbstring

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: sh-selfhelp_frontend/package-lock.json

      - name: Backend install
        working-directory: sh-selfhelp_backend
        run: composer install --no-interaction --no-progress

      - name: Frontend install + Chromium (with system deps)
        working-directory: sh-selfhelp_frontend
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Run golden E2E (harness owns seed + servers)
        working-directory: sh-selfhelp_frontend
        run: npm run test:golden

      - name: Upload Playwright artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-golden-report
          path: |
            sh-selfhelp_frontend/playwright-report/
            sh-selfhelp_frontend/test-results/
            sh-selfhelp_frontend/e2e-stack.backend.log
            sh-selfhelp_frontend/e2e-stack.frontend.log
          retention-days: 7
